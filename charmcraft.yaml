name: ubuntu
title: Ubuntu
summary: A pristine Ubuntu Server
description: |
  This simply deploys the Ubuntu Cloud/Server image
links:
  contact: https://matrix.to/#/#charmhub-charmdev:ubuntu.com
  issues:
    - https://github.com/canonical/charm-ubuntu/issues
  source:
    - https://github.com/canonical/charm-ubuntu

config:
  options:
    hostname:
      type: string
      default: ""
      description: Override hostname of machine, when empty uses default machine hostname

storage:
  block:
    type: block
    description: block device
    minimum-size: 100M
    multiple:
      range: 0-
  files:
    type: filesystem
    description: Mounted filesystem
    location: /srv/data
    minimum-size: 100M
    multiple:
      range: 0-1

type: charm
platforms:
  amd64:
    build-on:
      - ubuntu@22.04
      - ubuntu@24.04
      - ubuntu@26.04
    run-on:
      - ubuntu@18.04
      - ubuntu@20.04
      - ubuntu@22.04
      - ubuntu@24.04
      - ubuntu@26.04
  arm64:
    build-on:
      - ubuntu@22.04
      - ubuntu@24.04
      - ubuntu@26.04
    run-on:
      - ubuntu@18.04
      - ubuntu@20.04
      - ubuntu@22.04
      - ubuntu@24.04
      - ubuntu@26.04
  s390x:
    build-on:
      - ubuntu@22.04
      - ubuntu@24.04
    run-on:
      - ubuntu@18.04
      - ubuntu@20.04
      - ubuntu@22.04
      - ubuntu@24.04
  ppc64el:
    build-on:
      - ubuntu@22.04
      - ubuntu@24.04
    run-on:
      - ubuntu@18.04
      - ubuntu@20.04
      - ubuntu@22.04
      - ubuntu@24.04

parts:
  charm:
    plugin: charm
