name: ubuntu
title: Ubuntu
summary: A pristine Ubuntu Server
description: |
  This simply deploys the Ubuntu Cloud/Server image
links:
  contact: https://matrix.to/#/#charmhub-charmdev:ubuntu.com
  issues:
    - https://github.com/canonical/charm-ubuntu/issues
  source:
    - https://github.com/canonical/charm-ubuntu

config:
  options:
    hostname:
      type: string
      default: ""
      description: Override hostname of machine, when empty uses default machine hostname

storage:
  block:
    type: block
    description: block device
    minimum-size: 100M
    multiple:
      range: 0-
  files:
    type: filesystem
    description: Mounted filesystem
    location: /srv/data
    minimum-size: 100M
    multiple:
      range: 0-1

type: charm
platforms:
  ubuntu@22.04:amd64:
  ubuntu@22.04:arm64:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:
  ubuntu@26.04:amd64:
  ubuntu@26.04:arm64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
  icon:
    plugin: dump
    source: .
    stage:
      - icon.svg
