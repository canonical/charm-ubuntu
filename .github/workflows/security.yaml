name: Dependency vulnerability scan

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Export locked dependencies
        run: uv export --locked --no-emit-project --no-hashes --format requirements-txt --output-file requirements.txt

      - name: Run pip-audit
        run: uvx pip-audit --requirement requirements.txt --no-deps
