name: Test Suite
on: [pull_request]

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12", "3.14"]
    container:
      image: python:${{ matrix.python }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Run lint
        run: make lint
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12", "3.14"]
    container:
      image: python:${{ matrix.python }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Run test
        run: make unit
