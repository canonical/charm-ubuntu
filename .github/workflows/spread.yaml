name: Spread Integration Tests
on: [pull_request]

permissions: {}

jobs:
  spread:
    name: Spread integration test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up runner
        run: |
          sudo snap install --classic concierge
          sudo concierge prepare --trace -p machine
          go install github.com/canonical/spread/cmd/spread@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build charm
        run: charmcraft pack

      - name: Run spread
        env:
          CI: "true"
        run: spread -v lxd:ubuntu-24.04

      - name: Tear down on failure
        if: failure()
        run: sudo concierge restore --trace
