[tox]
envlist = integration
skipsdist = true

[testenv:integration]
skip_install = true
# Invoke pytest directly rather than going through `make`.
# opcli spread launches a bare Ubuntu cloud image which doesn't ship `make`.
allowlist_externals = uv
passenv =
    CHARM_PATH
    BASE
    SPREAD_JOB
commands =
    uv run --locked --group integration pytest --tb native --show-capture=no --log-cli-level=INFO -s --disable-warnings tests/integration --base={env:BASE:24.04} {posargs}
