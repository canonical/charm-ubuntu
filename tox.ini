# This file exists solely because `opcli spread` runs `tox -e integration`
# to invoke the integration tests. We shell out to pytest via uv directly
# rather than going through `make`, because opcli spread launches a bare
# Ubuntu cloud image that doesn't ship `make`.
[tox]
envlist = integration
skipsdist = true

[testenv:integration]
skip_install = true
allowlist_externals = uv
passenv =
    CHARM_PATH
    BASE
    SPREAD_JOB
commands =
    uv run --locked --group integration --group tooling pytest --tb native --show-capture=no --log-cli-level=INFO -s --disable-warnings tests/integration {posargs}
