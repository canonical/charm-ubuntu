[tox]
envlist = integration
skipsdist = true

[testenv:integration]
skip_install = true
# Invoke pytest directly rather than going through `make`.
# opcli spread launches a bare Ubuntu cloud image which doesn't ship `make`.
allowlist_externals = uv
passenv =
    CHARM_PATH
    BASE
    SPREAD_JOB
setenv =
    # Override the project-level [tool.uv] no-build guard so opcli's git
    # source distribution can install here. Lint/unit envs keep the guard.
    UV_NO_BUILD = false
commands =
    uv run --locked --group integration --group tooling pytest --tb native --show-capture=no --log-cli-level=INFO -s --disable-warnings tests/integration {posargs}
