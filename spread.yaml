project: charm-ubuntu
# Path on the remote worker where spread rsyncs the project (LXD container
# provisioned by concierge for the integration-test backend).
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m

backends:
  # integration-test is a virtual spread backend provided by opcli. Each
  # system entry defines a runner where spread executes the tests. What
  # gets *built* (and on which arch) is controlled by artifacts.yaml.
  integration-test:
    type: integration-test
    systems:
      - ubuntu-24.04:
          runner: [ubuntu-24.04]
          arch: amd64
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-arm64:
          runner: [ubuntu-24.04-arm]
          arch: arm64
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-ppc64el:
          runner: [self-hosted-linux-ppc64el-noble-edge]
          arch: ppc64el
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-s390x:
          runner: [self-hosted-linux-s390x-noble-medium]
          arch: s390x
          cpu: 4
          memory: 8
          disk: 40

environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'

exclude:
  - .git
  - .tox
  - .venv
  - .*_cache

integration-suites:
  tests/integration/:
    working-dir: ./
    summary: charm-ubuntu integration tests
    backends:
      - integration-test
    auto-discover: false
    # --base is our own pytest option, registered in
    # tests/integration/conftest.py -- not something spread or opcli provides.
    pytest-arguments-template: |
      --base {{ env.get("BASE", "24.04") }}
    environment:
      # `NAME/variant` is spread's variant syntax: every distinct `/suffix`
      # across these keys is one job, and a key's value applies only to that
      # variant. There's no partial product -- each variant is a full point in
      # the matrix -- so BASE is spelled out per juju version even though it
      # only depends on the base, and MODULE is repeated even though the value
      # never changes. MODULE can't be hoisted to a plain `MODULE:`: opcli
      # rejects a suite with `auto-discover: false` and no `MODULE/` entries.
      MODULE/base_2204_juju3: tests/integration/test_charm.py
      MODULE/base_2404_juju3: tests/integration/test_charm.py
      MODULE/base_2604_juju3: tests/integration/test_charm.py
      MODULE/base_2204_juju4: tests/integration/test_charm.py
      MODULE/base_2404_juju4: tests/integration/test_charm.py
      MODULE/base_2604_juju4: tests/integration/test_charm.py
      BASE/base_2204_juju3: "22.04"
      BASE/base_2404_juju3: "24.04"
      BASE/base_2604_juju3: "26.04"
      BASE/base_2204_juju4: "22.04"
      BASE/base_2404_juju4: "24.04"
      BASE/base_2604_juju4: "26.04"
      CONCIERGE/base_2204_juju4: concierge-juju4.yaml
      CONCIERGE/base_2404_juju4: concierge-juju4.yaml
      CONCIERGE/base_2604_juju4: concierge-juju4.yaml
