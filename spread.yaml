project: charm-ubuntu
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m

backends:
  integration-test:
    type: integration-test
    systems:
      - ubuntu-24.04

environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'

exclude:
  - .git
  - .tox
  - .venv
  - .*_cache
  - build

integration-suites:
  tests/integration/:
    working-dir: ./
    summary: charm-ubuntu integration tests
    backends:
      - integration-test
    auto-discover: false
    pytest-environment-template: |
      {% for build in artifacts.charms[0].builds if build.arch == arch %}
      CHARM_PATH={{ build.path }}
      {% endfor %}
      BASE={{ env.get("BASE", "24.04") }}
    environment:
      MODULE/base_2004_juju3: tests/integration/test_charm.py
      MODULE/base_2204_juju3: tests/integration/test_charm.py
      MODULE/base_2404_juju3: tests/integration/test_charm.py
      MODULE/base_2604_juju3: tests/integration/test_charm.py
      MODULE/base_2004_juju4: tests/integration/test_charm.py
      MODULE/base_2204_juju4: tests/integration/test_charm.py
      MODULE/base_2404_juju4: tests/integration/test_charm.py
      MODULE/base_2604_juju4: tests/integration/test_charm.py
      BASE/base_2004_juju3: "20.04"
      BASE/base_2204_juju3: "22.04"
      BASE/base_2404_juju3: "24.04"
      BASE/base_2604_juju3: "26.04"
      BASE/base_2004_juju4: "20.04"
      BASE/base_2204_juju4: "22.04"
      BASE/base_2404_juju4: "24.04"
      BASE/base_2604_juju4: "26.04"
      CONCIERGE/base_2004_juju4: concierge-juju4.yaml
      CONCIERGE/base_2204_juju4: concierge-juju4.yaml
      CONCIERGE/base_2404_juju4: concierge-juju4.yaml
      CONCIERGE/base_2604_juju4: concierge-juju4.yaml
