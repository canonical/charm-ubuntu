project: charm-ubuntu
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m

backends:
  integration-test:
    type: integration-test
    systems:
      - ubuntu-24.04

environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'

exclude:
  - .git
  - .tox
  - .venv
  - .*_cache
  - build

integration-suites:
  tests/integration/:
    working-dir: ./
    summary: charm-ubuntu integration tests
    backends:
      - integration-test
    auto-discover: false
    pytest-environment-template: |
      {% for build in artifacts.charms[0].builds if build.arch == arch %}
      CHARM_PATH={{ build.path }}
      {% endfor %}
      BASE={{ env.get("BASE", "24.04") }}
    environment:
      MODULE/base_2004: tests/integration/test_charm.py
      MODULE/base_2204: tests/integration/test_charm.py
      MODULE/base_2404: tests/integration/test_charm.py
      MODULE/base_2604: tests/integration/test_charm.py
      BASE/base_2004: "20.04"
      BASE/base_2204: "22.04"
      BASE/base_2404: "24.04"
      BASE/base_2604: "26.04"
